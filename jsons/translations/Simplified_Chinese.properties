Tutorial Industrial Capacity Allocation = 教程工业产能分配

Industrial capacity allocation is a core mechanism of this module, through the allocation of Industrial Capacity provided by industrial zoning, The various types of ore mined from the site are processed into resources available to the construction unit and further processed. = 工业产能分配是本模组的一项核心机制，通过分配由工业区划提供的工业产能，将从地块上开采的各类矿石加工为可供建造单位使用的资源，以及进行进一步的加工。

Only when raw materials meet consumption demand, will be processed. So the need for reasonable planning of industrial capacity. = 只有当原材料满足消耗需求时，才会进行加工。所以需要合理的规划工业产能。

Each industrial capacity can be \n\n4 Interstellar detritus processed into 2 Iron Ore and 1 Rare Metal Ore \n 1 Iron Ore processed into 1 Alloy \n 1 Rare Metal Ore processed into 1 Rare Metal \n 1 Focus Ore processed into 1 Focus Crystal \n 1 Alloy and 1 Rare Metal processed into 1 Light Alloy \n 1 Alloy and 1 Focus Crystal processed into 1 Tough Alloy = 每个工业产能可以将\n\n 4星际碎屑加工为2铁矿石和1稀有金属矿石\n 1铁矿石加工为1合金\n 1稀有金属矿石加工为1稀有金属\n 1聚能矿石加工为1聚能晶体\n 1合金和1稀有金属加工为1轻型合金\n 1合金和1聚能晶体加工为1韧性合金




