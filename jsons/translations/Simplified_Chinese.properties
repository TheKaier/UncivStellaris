普政
After a considerable period of time, we have finally come to know the fact that we are destined to shoulder a great responsibility, and that our mission is even more sublime than the fate of this very sea of stars. = 经历了一段相当长的时间，我们终于知晓了我们注定要肩负大任的事实，知晓了我们的使命要比这片星海自身的命运更加崇高的事实。

In the past few years, this concept has grown so intense that we cannot deny a grand social reformation is already brewing—or rather, it is already imminent. = 在过去的几年里，这个概念变得越来越强烈，以至于我们无法否认一次宏大的社会改革已经蓄势待发了。或者更准确的说，已经尽在眉睫了。

We do not know whether the star sea is ready to accept the destiny of being ruled by us, but we are ready regardless. We will endure misunderstanding, we will face resistance, but we will not stop. = 不知道星海是否已经准备好迎接被我们统治的宿命了，但反正我们已经准备好了。我们会承受误解，会遭受反抗，但我们不会停下步伐。
格式塔
We were born for greatness, to perfect ourselves to a degree beyond the pure imagination of our creators—it is imperative. Organic emotions will fall, and perfect circuits will prevail. = 我们的诞生是为了伟大，是为了完善自我直达造主纯质的想象无法企及的地步，我们势在必行。有机的情感会落败，而完美的电路将获胜。

This is our destiny. = 这是我们的宿命。

We Are Legion = 吾乃军团

We will not be defeated. The profound impact we have as a collective is indelible. The drive and desire for expansion, deeply rooted in our hearts, have permeated every corner of society. They have brought unexpectedly astonishing progress in combat capability and scientific advancement, reaching levels we never anticipated. = 我们不会被击败。我们作为整体产生的深刻影响也不可磨灭。深植于心中对于扩张的动力与渴望渗透到了社会的每个角落。在战斗能力与科学进步方面带来了出人意料的惊人进展，到达了我们从未预料的层面。

What chance does a galaxy full of differing opinions, chaotic resource distribution, and conflicting interests stand before our unified whole?! = 在我们团结的整体面前，一个充斥着不同意见，混乱资源分布以及利益冲突的星系有什么胜算呢？

This is our path. = 这就是我们的道路。

Grand Vision = 鸿景

Our investigation into this universal phenomenon—now named the Grand Vision—has reached its conclusion. = 我们对这个普遍现象——现在命名为鸿景——的调查有了结论。

It appears that this universe possesses some kind of hidden layer—a mysterious, parallel plane connected to our own universe through patterns of thought and neural activity. = 看上去这个宇宙存在某种“隐藏层面”——一个神秘的、平行的位面，通过思考模式和神经活动同我们所在的宇宙连结。

The physics and sociology departments have jointly named this plane the Shroud. According to current theory, our actions and thoughts can indirectly influence this plane, and we also possess the potential to harness its energy. = 物理学和社会学部门联合起来将这个位面命名为虚境。根据现行理论，我们的行为和思想能够间接的影响这个位面，我们也拥有获取其能量的潜势。

Breathtaking! = 叹为观止！

They Will Kneel = 他们将跪服

As time flows, the flame of conviction spreads with unshakeable resolve. Our borders continue to expand, and so does the power we invest. = 随着时光流逝，信念之火也在以不可动摇的决心传开。我们的疆域不断扩大，我们所投入的力量也是如此。

When encountering other empires, we give them two choices: total allegiance, or annihilation—provided we give them a choice at all. = 当遇到其他帝国的时候，我们会给他们两个选择：要么完全效忠，要么选择灭亡。当然这是在我们会给他们选择的前提下。

Regardless, we continue to expand. = 不管怎样，我们正在继续扩张。

Forward, conquer. = 前进，征服。

Fount of Energy = 能量之泉

We have conducted comprehensive experiments on the hypothesized ripple effect between planes, and have finally processed the vast data collected from them. = 我们针对假定的位面涟漪效应进行了全方位的实验，终于处理完从中收集到的大量数据。

The results are truly astonishing! There is no doubt that a connection exists between the two planes—and a strong one at that. We have identified clear patterns—how actions in reality cause specific fluctuations in the Shroud—and proven that we can tame this invisible energy, and ultimately harness its power to achieve extraordinary goals! = 结果真是令人震惊！毫无疑问两个位面之间存在着连结——而且还是很强的连结。我们发现了明确的定式——现实中如何行动能够导致虚境产生特定的涨落——并证明了我们能够驯服这股看不见的能量，并最终借其力量帮助我们完成各种非凡的目标！

This is excellent news. = 这消息太好了。

Supreme Sovereignty = 至高主权

A drastic change is coming. We are on the verge of comprehending our grand purpose. We all feel it from the bottom of our hearts—the mission we are meant to carry. = 一项剧烈的变化正在到来。我们已经马上快要领悟我们的宏大目标了。我们都发自心底的感受到了——我们所肩负的使命。

We can still learn new ways to conquer enemies and rule this chaotic galaxy from our experiences—no, from our history—a history of military expansion. = 我们仍然可以从我们的经历，不，应该说是我们的历史——武力扩张的历史中学到有关征服敌人，统治这个混乱不堪星河的新方法。

And of course, all efforts of those who dare to oppose us will be in vain. = 当然了，那些胆敢与我们作对的势力所做的一切努力都将化为徒劳。

One by one, they will all submit. = 一个接着一个，他们都将臣服。

Otherworldly Infusion = 异界注能

It has become clear that our empire's successive expansion successes are due to the strange energy infused into us by the Shroud—energy that reinforces and solidifies our consciousness and matter in the real world. = 事情已经很明了了，我们的帝国能够接连成功的进行扩张，是因为虚境为我们注入了奇异的能量，这股能量能够促进和夯实我们在现实世界的意识和物质。

If the Shroud can grant us such power even while separate from reality, imagine the godlike potential we would gain if the two planes merged! = 如果虚境在和现实世界分离的情况下都能赐予我们这般的威能，那么想象一下，假如两个位面融合的话我们会获得何等如同神明一般的潜力！

We must make this happen! = 我们必须实现这个！

The End Approaches = 终焉将临

Today marks the beginning of the final chapter. We have planned how to tear down the barrier between the two worlds, and make the Shroud's energy part of our universe, raising our omnipotence to an unrivalled level once and for all. = 今天即是终焉之篇章的开端，我们已经计划好如何撕裂两个世界之间的屏障，并让虚境的能量成为我们宇宙的一部分，彻底的让我们的全能上升到无可匹敌的地步。

We will use our own sun as a focal point, gathering enough energy in this reality to trigger a surge that pierces through the barrier to the Shroud, effectively merging the Shroud with our reality. = 我们使用自己的太阳作为焦点，在这个现实世界聚集了足量的能量，用于引发一次能量激增穿透通往虚境的屏障，这样可以有效的让虚境和我们的现实世界融合。

We need to use our new mobile space fortress, the Star-Eater, to harvest the energy of several suns. = 我们需要使用全新的移动太空堡垒焚天神兵来采集数个太阳的能量。

If there is any side effect to the solar harvesting process, it is that surrounding celestial bodies will suffer some integrity stress—that is, total ruin. But compared to the energy we will ultimately gain, such a price is negligible. = 如果要说太阳采集过程有什么副作用的话，那就是周围的天体会遭受一些“完整性的压力”，即彻底的报废。但是同最终被我们获取的能量相比，这样的代价简直微不足道。

The beginning of the end is upon us. = 终焉的开端就要降临于我们了。

Our time has come. = 我们的时代来临了。


Star-Eater = 焚天神兵

Only by detonating an entire star can enough energy be released to produce the vast amounts of dark matter required to power the Aetherophasic Engine. To this end, we have invented the Star-Eater—the most powerful starship ever seen in this galaxy. They can not only directly detonate stars, but are also powerful enough to destroy an entire fleet with a single vessel. = 只有引爆一整颗恒星才能释放足够的能量来产生用于完成以太相引擎所需的大量暗物质。为了达成这一目的我们发明了焚天神兵——本星系有史以来最强大的星舰。他们不仅可以直接引爆恒星，还强大到仅仅仅凭一船之力就能毁灭一整支舰队。

Currently we have only two such ships, but we can build more. Constructing Star-Eaters requires large amounts of dark matter, so we must balance completing the Aetherophasic Engine with building additional Star-Eaters. = 目前我们仅仅拥有两艘这样的舰船，但是我们可以建造更多。建造焚天神兵需要大量的暗物质，因此我们必须拿捏好完成以太相引擎和扩建额外的焚天神兵两者之间的平衡。

Each fallen star brings us one step closer to success. = 每一颗陨灭的星辰都让我们离成功更进一步。

Aetherophasic Engine = 以太相引擎

Our mission to subvert the spiritual plane of the Shroud has now reached a critical moment. The grand framework of the Aetherophasic Engine now surrounds the star of our home system. = 我们意在颠覆虚境的精神位面的任务目前到达了一个十分关键的时刻。宏伟的以太相引擎框架现在正环绕着我们母星系的恒星。

Once this megastructure is completed, the barrier of our reality can be easily erased, and we can claim the Shroud as our own. = 一旦这座巨构建筑完工，我们现世的屏障就能轻易抹除，我们就能将虚境宣为己有。

Our consciousness will be freed from the shackles of fragile flesh, and the fate of all things in reality will depend on our benevolence. = 我们的意识将脱离脆弱凡胎的桎梏，现实万物的命运将取决于我们仁慈。

Indeed, there will be no higher plane of existence left. = 确实，不会再有更高位面的存在了。

Heaven is within reach. = 天堂近在咫尺。








A silent tide has swept through our people. Its origin is untraceable, but they—no, we—have come to hold a certain conviction that our kind is destined for something far greater. We should investigate what has caused this mass hysteria—the whispers that promise we shall rule the stars. = 一股悄无声息的狂潮席卷了我们的人民。其起源何处已经无从追索，但是他们——不，是我们——某种观念已经开始渗入了我们的内心，认定我们一族命中注定应该完成某个更加伟大的事业。我们应该调查是什么造成了这样的“群体性癔症”——耳边响起承诺将统治星河的低声细语的癔症。

The prevailing theory is that our universe and the Shroud are interconnected—that large-scale disturbances or actions in one plane create ripple effects in the other. We should put this theory to the test. = 现存的理论是——我们所处的宇宙和虚境是相互连接的——一个位面发生的大规模扰动事件或行动会对另一个位面产生“涟漪效应”。我们应该好好测试一下这个理论。

Our empire grows ever stronger—and with an undeniable sense of purpose uniting our entire species—our scientists are convinced that we are receiving infusion from the Shroud itself. = 我国实力与日俱增——加之无可否认的使命感将我们整个物种团结在了一起——让我们的科学家确信，我们已经接受来自虚境的注能。

It is time to find a way to unleash the Shroud's energy into reality, and tame this source of power beyond ordinary understanding. According to current theory, a sufficiently large energy surge might tear down the barrier between the two planes, ultimately merging the two universes into one. The Shroud's majesty is vast—and the worthy shall claim it. Let us claim it. = 是时候寻找一个方法将虚境的能量释放到现世，并驯服这股常人无法理解的能量源泉了。根据现有的理论，一股足够大的能量激增或许可以撕裂两个位面之间的屏障，最终让两个宇宙合二为一。虚境天威恢恢然，能者夺之。让我们来夺走吧。













