Subspace Echoes = 亚空间回声

我方的几处跟踪站都截获了一种奇怪的亚空间回声。声音来源于其他星系。回声刚开始时较弱，但后来逐渐变强，似乎有什么正在靠近我方星系……

新的风暴即将出现。





Brood-Queen Captured = 捕获虫后

在最近与索林原虫的舰队交火中，我们的部队设法夺取了它们的一只虫后运送的某种卵。卵不久后就孵化了，显露出其中的虫后。

The Wounded Queen = 受伤的虫后

我们的一架深空侦察探机闯入了一处战场余骸，这场战斗的双方是索林虫族和某未知势力。一只索林原虫虫后似乎在战斗之后受了重伤，被抛弃在此，任其自生自灭。 用于侦察的探机汇报称，虫后仍一息尚存。现在是难得一遇的活捉虫后的好机会。
派遣一支考察队过去。




Hole in the Void = 虚空之洞

我们抓到的索林原虫虫后在前几个月里变得越来越暴躁不安。起先我们以为它只不过是因为与其他同类失去了联络，但后来我们收到了它的通讯，说着什么“虚空之洞”云云。
我们在研究索林原虫的跨星系旅行方法、并在天文数据库中发现了一个差异时才明白它说的到底是什么意思。绘制索林原虫可能走过的路径的过程中，我们发现一个距离我们大约3000万光年的小螺旋星系不见了。

那个星系我们曾在太空时代早期发现并研究过，但现在已经不再发出任何可被我们仪器探测到的光。这一意料之外的奇特发现让我们的科学家们争先恐后地想解释到底是什么东西导致了整个星系从宇宙中消失。

目前有两种解释：要么是星系中的恒星突然全部熄灭，要么是有某种东西，某种大得足以遮蔽整个星系的东西，挡住了它照射过来的光。这两种理论似乎都难以置信，许多人谴责它们荒唐可笑，并且更倾向于认为这个消失的星系本就不存在，只是是由于对原始望远镜的错误使用而产生的。尽管如此，整个事件透着一种明显的恐惧和噩兆……




我们抓到的索林原虫虫后在前几个月里变得越来越暴躁不安。起先我们以为它只不过是因为与其他同类失去了联络，但后来我们收到了它的通讯，说着什么“虚空之洞”云云。
我们在研究索林原虫的跨星系旅行方法、并在天文数据库中发现了一个差异时才明白它说的到底是什么意思。绘制索林原虫可能走过的路径的过程中，我们发现一个距离我们大约3000万光年的小螺旋星系不见了。

从我们的太空时代早期开始，这个星系就被记录在案，但我们再也无法通过仪器观察到它发出任何形式的光。进一步的调查得出了两种可能的解释。

要么是星系中的恒星同时熄灭，要么是一个巨大到足以遮蔽星系这么大空间区域的实体挡住了光源。这两种解释都违背了正常的逻辑，然而，除非有明显的相反证据，否则无法排除这两种可能性。











